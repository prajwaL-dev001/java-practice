<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="container">

      <header class="header">
        <div>
          <h1>💰 Personal Finance Tracker</h1>
          <p>Track your income and expenses easily</p>
        </div>
        <button id="theme-toggle">🌙 Toggle Theme</button>
      </header>

      <section class="summary">
        <div class="card balance-card">
          <h2>Current Balance</h2>
          <p id="balance">₹0.00</p>
        </div>

        <div class="cards-row">
          <div class="card income-card">
            <h3>Total Income</h3>
            <p id="income">₹0.00</p>
          </div>

          <div class="card expense-card">
            <h3>Total Expense</h3>
            <p id="expense">₹0.00</p>
          </div>
        </div>

        <div class="card chart-card">
          <h2>Income vs Expense</h2>
          <canvas id="myChart"></canvas>
        </div>
      </section>

      <section class="form-section card">
        <h2>Add Transaction</h2>
        <form id="transaction-form">
          <div class="form-group">
            <label for="text">Description</label>
            <input type="text" id="text" placeholder="Enter description" />
          </div>

          <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount" />
          </div>

          <div class="form-group">
            <label for="type">Type</label>
            <select id="type">
              <option value="">Select type</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="Example: Food, Salary, Rent" />
          </div>

          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" />
          </div>

          <button type="submit" class="btn">Add Transaction</button>
        </form>
      </section>

      <section class="history card">
        <div class="history-header">
          <h2>Transaction History</h2>
          <button id="clear-all" class="clear-btn">Clear All</button>
        </div>
        <ul id="transaction-list"></ul>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
